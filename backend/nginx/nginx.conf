worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"referrer":"$http_referer",'
        '"user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;
    gzip_min_length 1000;
    client_max_body_size 15M;   # must be >= MAX_UPLOAD_SIZE_MB

    # ── Rate limiting (outer layer, before FastAPI's slowapi) ────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=200r/m;
    limit_req_status 429;

    # ── Upstream ─────────────────────────────────────────────────────────────
    upstream solar_api {
        server api:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.solarai.dev;

        # SSL (replace with real certs; Let's Encrypt recommended)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Proxy to FastAPI ──────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://solar_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection "";

            proxy_connect_timeout 10s;
            proxy_read_timeout    70s;   # > FastAPI REQUEST_TIMEOUT_SECONDS
            proxy_send_timeout    70s;
        }

        # ── Swagger UI (restrict in production if needed) ─────────────────────
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://solar_api;
            proxy_set_header Host $host;
        }

        # ── Health probe (no rate limit) ──────────────────────────────────────
        location /api/v1/health {
            proxy_pass http://solar_api/api/v1/health;
            proxy_set_header Host $host;
            access_log off;         # don't pollute logs with health probes
        }
    }
}
